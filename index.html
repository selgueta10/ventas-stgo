<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Ventas Stgo - Sistema POS</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ventas Stgo">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fish_icon.svg/512px-Fish_icon.svg.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#0b55cf", "secondary": "#006e2c", "surface": "#f8f9fb" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-icon { font-variation-settings: 'FILL' 1; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .nav-item.active { background-color: rgba(11, 85, 207, 0.1); color: #0b55cf; border-radius: 0.75rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .sortable-ghost { opacity: 0.4; background-color: #ebf4ff; }
    </style>
</head>
<body class="bg-surface text-[#191c1e] min-h-screen pb-32">

    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm flex items-center justify-between px-6 h-16">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary">storefront</span>
            </div>
            <span class="font-manrope font-black text-primary text-lg tracking-tighter">Ventas Stgo</span>
        </div>
    </header>

    <main id="view-dashboard" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <h1 class="text-4xl font-extrabold tracking-tight mb-6 text-[#191c1e]">Dashboard</h1>
        <select id="dash-mes" onchange="renderizarDashboard()" class="w-full mb-6 bg-white border-none rounded-2xl font-bold py-4 px-4 shadow-sm outline-none"></select>
        <div id="dash-summary" class="grid grid-cols-2 gap-4 mb-8"></div>
        <div id="dash-top-clientes" class="bg-white p-5 rounded-3xl shadow-sm mb-6"></div>
    </main>

    <main id="view-catalogo" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-4xl font-extrabold tracking-tight">Catálogo</h1>
            <button onclick="abrirModalProducto()" class="bg-primary text-white p-3 rounded-2xl shadow-lg"><span class="material-symbols-outlined">add</span></button>
        </div>
        <div id="catalogo-grid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <main id="view-venta" class="pt-24 px-4 max-w-lg mx-auto space-y-6 hidden">
        <h2 class="text-5xl font-extrabold text-primary text-center tracking-tighter" id="total-venta-en-curso">$ 0</h2>
        <div id="carrito-contenedor" class="bg-white p-4 rounded-3xl space-y-3 shadow-sm min-h-[100px]"></div>
        <div class="space-y-3">
            <input id="nombre-cliente" type="text" placeholder="Nombre del Cliente" class="w-full h-14 px-4 bg-white rounded-2xl border-none shadow-sm outline-none">
            <input id="costo-delivery-input" type="number" placeholder="Costo Delivery / Envío ($)" class="w-full h-14 px-4 bg-white rounded-2xl border-none shadow-sm outline-none">
            <input id="direccion-cliente-input" type="text" placeholder="Dirección para la Ruta" class="w-full h-14 px-4 bg-white rounded-2xl border-none shadow-sm outline-none">
            <button onclick="confirmarVenta()" class="w-full py-4 bg-primary text-white font-bold text-lg rounded-2xl shadow-lg active:scale-95 transition-transform">Confirmar Venta</button>
        </div>
    </main>

    <main id="view-rutas" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <div class="flex justify-between items-start mb-2">
            <h1 class="text-4xl font-extrabold tracking-tight">Mi Ruta</h1>
            <button onclick="vaciarRuta()" class="text-red-500 text-xs font-bold uppercase mt-2">Limpiar</button>
        </div>
        <p class="text-xs text-gray-500 mb-6">Ordena tus paradas y navega con Waze paso a paso.</p>
        
        <div id="lista-ruta-maestra" class="space-y-4">
            </div>

        <div id="ruta-vacia-msg" class="text-center py-20 opacity-20">
            <span class="material-symbols-outlined text-7xl">route</span>
            <p class="font-bold mt-2">Agrega pedidos desde el historial</p>
        </div>
    </main>

    <main id="view-historial" class="pt-24 px-6 max-w-lg mx-auto hidden">
        <h1 class="text-4xl font-extrabold tracking-tight mb-4">Historial</h1>
        <div id="resumen-total-historial" class="mb-6 text-primary font-black text-xl"></div>
        <div id="lista-historial" class="space-y-3"></div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-4 bg-white/90 backdrop-blur-md border-t z-50">
        <div id="nav-dashboard" onclick="cambiarVista('dashboard')" class="nav-item active flex flex-col items-center p-2 transition-all">
            <span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-bold">Dash</span>
        </div>
        <div id="nav-catalogo" onclick="cambiarVista('catalogo')" class="nav-item inactive flex flex-col items-center p-2">
            <span class="material-symbols-outlined">inventory_2</span><span class="text-[10px] font-bold">Catálogo</span>
        </div>
        <div id="nav-venta" onclick="cambiarVista('venta')" class="nav-item inactive flex flex-col items-center p-2">
            <span class="material-symbols-outlined">add_shopping_cart</span><span class="text-[10px] font-bold">Venta</span>
        </div>
        <div id="nav-rutas" onclick="cambiarVista('rutas')" class="nav-item inactive flex flex-col items-center p-2">
            <span class="material-symbols-outlined">local_shipping</span><span class="text-[10px] font-bold">Rutas</span>
        </div>
        <div id="nav-historial" onclick="cambiarVista('historial')" class="nav-item inactive flex flex-col items-center p-2">
            <span class="material-symbols-outlined">history</span><span class="text-[10px] font-bold">Historial</span>
        </div>
    </nav>

    <div id="modal-producto" class="fixed inset-0 z-[110] bg-black/40 hidden flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
            <h2 id="modal-producto-titulo" class="font-extrabold text-xl">Gestión de Producto</h2>
            <input type="hidden" id="prod-id-edit">
            <input id="prod-nombre" type="text" placeholder="Nombre" class="w-full bg-gray-100 p-4 rounded-2xl border-none">
            <div class="grid grid-cols-2 gap-4">
                <input id="prod-costo" type="number" placeholder="Costo" class="w-full bg-gray-100 p-4 rounded-2xl border-none">
                <input id="prod-venta" type="number" placeholder="Venta" class="w-full bg-gray-100 p-4 rounded-2xl border-none">
            </div>
            <button onclick="guardarProductoNube()" class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg">Guardar en Nube</button>
            <button onclick="cerrarModalProducto()" class="w-full text-gray-400 text-xs font-bold uppercase">Cerrar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyByG_bsoZoKPpIka_MlSPl_Xu_ljlYQStI",
            authDomain: "ventas-stgo-fade4.firebaseapp.com",
            projectId: "ventas-stgo-fade4",
            storageBucket: "ventas-stgo-fade4.firebasestorage.app",
            messagingSenderId: "832645466602",
            appId: "1:832645466602:web:b9f21f4390d56294b48a93"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ESTADO GLOBAL
        let catalogoApp = [], carrito = [], historialVentas = [];
        let rutaActiva = JSON.parse(localStorage.getItem('rutaActiva_V2')) || [];

        const productosDefecto = [
            { nombre: "1 kg palta", costo: 3800, venta: 5900 },
            { nombre: "3 kg palta", costo: 11400, venta: 15000 },
            { nombre: "1 kg camarones 36/40", costo: 8900, venta: 11900 },
            { nombre: "1 pote de erizos", costo: 10000, venta: 16900 },
            { nombre: "Salmon ahumado", costo: 6500, venta: 8900 },
            { nombre: "Frasco de locos 1000cc", costo: 26900, venta: 29900 },
            { nombre: "Pinzas de jaiba", costo: 11900, venta: 14900 },
            { nombre: "Carne de jaiba 500gr", costo: 9500, venta: 13900 },
            { nombre: "Carne de jaiba 1 kg", costo: 17900, venta: 23900 },
            { nombre: "Filete de salmon 1 kg", costo: 13500, venta: 20900 },
            { nombre: "Ostiones media concha 1 kg", costo: 13900, venta: 19900 },
            { nombre: "Huevos", costo: 7200, venta: 8900 },
            { nombre: "Dulce de castaña 1 kg", costo: 10000, venta: 18000 },
            { nombre: "Dulce de castaña 500gr", costo: 5000, venta: 12000 },
            { nombre: "Machas 20 unidades", costo: 7500, venta: 10900 },
            { nombre: "Merluza", costo: 10900, venta: 12900 },
            { nombre: "merluza x mayor", costo: 10600, venta: 11600 }
        ];

        function inicializarApp() {
            // 1. Sincronizar Catálogo (Blindado contra clones)
            db.collection("productos").get().then((snap) => {
                if(snap.empty) {
                    productosDefecto.forEach(p => {
                        let id = p.nombre.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
                        db.collection("productos").doc(id).set({...p, id: id, ganancia: p.venta - p.costo});
                    });
                }
                db.collection("productos").orderBy("nombre").onSnapshot(s => {
                    catalogoApp = []; s.forEach(doc => catalogoApp.push(doc.data()));
                    renderizarCatalogo();
                });
            });

            // 2. Sincronizar Ventas
            db.collection("ventas").orderBy("idVenta", "desc").onSnapshot(snap => {
                historialVentas = []; snap.forEach(doc => historialVentas.push(doc.data()));
                renderizarHistorial();
                renderizarDashboard();
            });
        }

        // --- GESTIÓN DE RUTAS (NAVEGACIÓN INTERNA) ---
        function agregarARuta(idVenta) {
            const venta = historialVentas.find(v => v.idVenta == idVenta);
            if (!venta.direccion) return alert("Esta venta no tiene dirección. Agrégala editando la venta.");
            if (rutaActiva.find(r => r.idVenta == idVenta)) return alert("Ya está en la lista de ruta.");
            
            rutaActiva.push({ 
                idVenta: venta.idVenta, 
                cliente: venta.cliente, 
                direccion: venta.direccion,
                completado: false 
            });
            guardarRuta();
            renderizarRuta();
            alert("Añadido a la Ruta 🚚");
        }

        function renderizarRuta() {
            const cont = document.getElementById('lista-ruta-maestra');
            const msg = document.getElementById('ruta-vacia-msg');
            
            if (rutaActiva.length === 0) {
                cont.innerHTML = ''; msg.classList.remove('hidden'); return;
            }

            msg.classList.add('hidden');
            cont.innerHTML = rutaActiva.map((r, i) => `
                <div class="bg-white p-4 rounded-3xl shadow-sm flex flex-col gap-3 border-l-8 ${r.completado ? 'border-gray-300 opacity-50' : 'border-primary'}">
                    <div class="flex justify-between items-start">
                        <div class="flex items-center gap-3">
                            <span class="w-8 h-8 bg-blue-100 text-primary rounded-full flex items-center justify-center font-black text-sm">${i+1}</span>
                            <div>
                                <p class="font-bold text-base leading-tight">${r.cliente}</p>
                                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-wider">${r.direccion}</p>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="moverParada(${i}, -1)" class="p-2 bg-gray-50 rounded-lg"><span class="material-symbols-outlined text-sm">expand_less</span></button>
                            <button onclick="moverParada(${i}, 1)" class="p-2 bg-gray-50 rounded-lg"><span class="material-symbols-outlined text-sm">expand_more</span></button>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 mt-1">
                        <button onclick="abrirWaze('${r.direccion}')" class="flex-grow py-3 bg-[#33ccff] text-white rounded-2xl font-bold text-sm flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined text-lg">navigation</span> Iniciar Waze
                        </button>
                        <button onclick="completarParada(${i})" class="w-14 h-12 bg-green-100 text-green-600 rounded-2xl flex items-center justify-center">
                            <span class="material-symbols-outlined">${r.completado ? 'undo' : 'check_circle'}</span>
                        </button>
                        <button onclick="quitarDeRuta(${i})" class="w-14 h-12 bg-red-50 text-red-400 rounded-2xl flex items-center justify-center">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function abrirWaze(dir) {
            const url = `https://waze.com/ul?q=${encodeURIComponent(dir + ", Santiago, Chile")}&navigate=yes`;
            window.open(url, '_blank');
        }

        function moverParada(index, delta) {
            const n = index + delta;
            if (n >= 0 && n < rutaActiva.length) {
                const temp = rutaActiva[index];
                rutaActiva[index] = rutaActiva[n];
                rutaActiva[n] = temp;
                guardarRuta(); renderizarRuta();
            }
        }

        function completarParada(i) { rutaActiva[i].completado = !rutaActiva[i].completado; guardarRuta(); renderizarRuta(); }
        function quitarDeRuta(i) { rutaActiva.splice(i, 1); guardarRuta(); renderizarRuta(); }
        function vaciarRuta() { if(confirm("¿Borrar toda la ruta?")) { rutaActiva = []; guardarRuta(); renderizarRuta(); } }
        function guardarRuta() { localStorage.setItem('rutaActiva_V2', JSON.stringify(rutaActiva)); }

        // --- FUNCIONES CORE ---
        function renderizarCatalogo() {
            const grid = document.getElementById('catalogo-grid');
            grid.innerHTML = catalogoApp.map(p => `
                <div class="bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4 active:scale-95 transition-transform">
                    <div class="flex-grow"><h3 class="font-bold text-sm">${p.nombre}</h3><p class="text-primary font-black text-lg">${fmt(p.venta)}</p></div>
                    <button onclick="addCarrito('${p.id}')" class="bg-blue-50 text-primary w-12 h-12 rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined">add_shopping_cart</span></button>
                </div>
            `).join('');
        }

        function renderizarHistorial() {
            const cont = document.getElementById('lista-historial');
            cont.innerHTML = historialVentas.map(v => `
                <div class="bg-white p-4 rounded-3xl shadow-sm flex justify-between items-center border-l-4 border-primary">
                    <div class="flex-grow">
                        <p class="font-bold text-sm text-[#191c1e]">${v.cliente}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">${v.fechaStr}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="font-black text-primary text-sm">${fmt(v.total)}</p>
                        <button onclick="agregarARuta(${v.idVenta})" class="w-10 h-10 bg-primary text-white rounded-full flex items-center justify-center shadow-md">
                            <span class="material-symbols-outlined text-[18px]">add_road</span>
                        </button>
                    </div>
                </div>
            `).join('');
            document.getElementById('resumen-total-historial').innerText = "Ventas: " + fmt(historialVentas.reduce((s,v) => s+v.total,0));
        }

        function addCarrito(id) {
            const p = catalogoApp.find(x => x.id === id);
            const it = carrito.find(x => x.id === id);
            if (it) it.can++; else carrito.push({ ...p, can: 1 });
            renderCarrito();
        }

        function renderCarrito() {
            const cont = document.getElementById('carrito-contenedor'), totalT = document.getElementById('total-venta-en-curso');
            if (carrito.length === 0) { cont.innerHTML = '<p class="text-center py-4 text-gray-300">Selecciona productos...</p>'; totalT.innerText = '$ 0'; return; }
            cont.innerHTML = carrito.map((it, i) => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                    <div class="w-1/2"><p class="font-bold text-xs truncate">${it.nombre}</p></div>
                    <div class="flex items-center gap-2">
                        <button onclick="modCarrito(${i},-1)" class="w-8 h-8 rounded-full border">-</button>
                        <b class="text-sm w-4 text-center">${it.can}</b>
                        <button onclick="modCarrito(${i},1)" class="w-8 h-8 rounded-full bg-primary text-white">+</button>
                    </div>
                </div>
            `).join('');
            totalT.innerText = fmt(carrito.reduce((s, it) => s + (it.venta * it.can), 0));
        }
        function modCarrito(i, d) { carrito[i].can += d; if(carrito[i].can<=0) carrito.splice(i,1); renderCarrito(); }

        function confirmarVenta() {
            if (carrito.length === 0) return;
            const idV = historialVentas.length ? Math.max(...historialVentas.map(v => parseInt(v.idVenta))) + 1 : 1013;
            const v = {
                idVenta: idV,
                cliente: document.getElementById('nombre-cliente').value || "Mostrador",
                total: carrito.reduce((s, it) => s + (it.venta * it.can), 0),
                costoDelivery: parseInt(document.getElementById('costo-delivery-input').value) || 0,
                direccion: document.getElementById('direccion-cliente-input').value || "",
                fechaIso: new Date().toISOString().split('T')[0],
                fechaStr: new Date().toLocaleDateString('es-CL'),
                items: carrito.map(it => ({nombre: it.nombre, cantidad: it.can, venta: it.venta}))
            };
            db.collection("ventas").doc(idV.toString()).set(v).then(() => {
                carrito = []; renderCarrito();
                document.getElementById('nombre-cliente').value = ""; document.getElementById('costo-delivery-input').value = ""; document.getElementById('direccion-cliente-input').value = "";
                cambiarVista('historial');
            });
        }

        function renderizarDashboard() {
            const sel = document.getElementById('dash-mes');
            const meses = [...new Set(historialVentas.map(v => v.fechaIso.substring(0,7)))].sort().reverse();
            if(sel.innerHTML == "" && meses.length) sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
            const filtradas = historialVentas.filter(v => v.fechaIso.startsWith(sel.value));
            const ing = filtradas.reduce((s,v) => s + v.total, 0);
            document.getElementById('dash-summary').innerHTML = `<div class="col-span-2 bg-primary p-6 rounded-3xl text-white shadow-xl"><p class="text-xs opacity-70 uppercase font-bold">Ventas Mes</p><p class="text-4xl font-black">${fmt(ing)}</p></div>`;
        }

        function abrirModalProducto() { document.getElementById('modal-producto').classList.remove('hidden'); }
        function cerrarModalProducto() { document.getElementById('modal-producto').classList.add('hidden'); }
        function guardarProductoNube() {
            const n = document.getElementById('prod-nombre').value;
            const id = n.replace(/\s+/g, '_').toLowerCase();
            db.collection("productos").doc(id).set({id, nombre: n, costo: parseInt(document.getElementById('prod-costo').value), venta: parseInt(document.getElementById('prod-venta').value)}).then(cerrarModalProducto);
        }

        const fmt = (v) => new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(v || 0);
        function cambiarVista(v) {
            ['dashboard', 'catalogo', 'venta', 'rutas', 'historial'].forEach(x => document.getElementById('view-'+x).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(it => it.classList.replace('active','inactive'));
            document.getElementById('nav-'+v).classList.replace('inactive','active');
            if(v === 'rutas') renderizarRuta();
        }

        inicializarApp(); cambiarVista('dashboard');
    </script>
</body>
</html>

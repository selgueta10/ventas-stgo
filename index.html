<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Ventas Stgo - Sistema POS</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ventas Stgo">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fish_icon.svg/512px-Fish_icon.svg.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#0b55cf", "secondary": "#006e2c", "surface": "#f8f9fb", "error": "#ba1a1a" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-icon { font-variation-settings: 'FILL' 1; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .nav-item.active { background-color: rgba(11, 85, 207, 0.1); color: #0b55cf; border-radius: 0.75rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Toggle Switch Style */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3870ea; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="bg-surface text-[#191c1e] min-h-screen pb-32">

    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm flex items-center justify-between px-6 h-16">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary">storefront</span>
            </div>
            <span class="font-manrope font-black text-primary text-lg tracking-tighter">Ventas Stgo</span>
        </div>
    </header>

    <main id="view-dashboard" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <div class="flex items-center justify-between mb-6">
            <div>
                <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 font-bold">Resumen de Operación</p>
                <h1 class="text-4xl font-extrabold tracking-tight">Dashboard</h1>
            </div>
            <select id="dash-mes" onchange="renderizarDashboard()" class="bg-white border-none rounded-xl text-sm font-bold text-primary focus:ring-0 shadow-sm py-3 px-4 outline-none"></select>
        </div>
        <div id="dash-summary" class="grid grid-cols-2 gap-4 mb-8"></div>
        <section class="mb-8 space-y-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm" id="dash-top-clientes"></div>
        </section>
    </main>

    <main id="view-catalogo" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <div class="flex justify-between items-start mb-6">
            <div>
                <p class="text-[10px] uppercase tracking-widest text-gray-400 mb-1 font-bold">Inventario en Nube</p>
                <h1 class="text-4xl font-extrabold tracking-tight">Catálogo</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="abrirModalCategorias()" class="bg-blue-50 text-primary p-3 rounded-2xl shadow-sm active:scale-95 transition-transform">
                    <span class="material-symbols-outlined">style</span>
                </button>
                <button onclick="abrirModalProducto()" class="bg-primary text-white p-3 rounded-2xl shadow-lg active:scale-95 transition-transform">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
        </div>
        <div id="catalogo-grid" class="grid grid-cols-1 gap-3"></div>
    </main>

    <main id="view-venta" class="pt-24 px-4 max-w-lg mx-auto space-y-6 hidden">
        <section class="mt-4">
            <p class="text-xs uppercase tracking-widest mb-1 opacity-60 font-bold text-center">Total a cobrar</p>
            <h2 class="text-5xl font-extrabold text-primary text-center tracking-tighter" id="total-venta-en-curso">$ 0</h2>
        </section>
        
        <div id="carrito-contenedor" class="bg-white p-4 rounded-3xl space-y-3 shadow-sm min-h-[100px]"></div>
        
        <div class="space-y-3">
            <input id="nombre-cliente" type="text" placeholder="Nombre del Cliente" class="w-full h-14 px-4 bg-white rounded-2xl border-none shadow-sm outline-none">
            <input id="costo-delivery-input" type="number" placeholder="Costo Delivery / Envío ($)" class="w-full h-14 px-4 bg-white rounded-2xl border-none shadow-sm outline-none">
            
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm space-y-3">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-bold uppercase text-gray-400">¿Hago yo el reparto?</p>
                    <label class="switch">
                        <input type="checkbox" id="check-hago-reparto" onchange="toggleInputsReparto()">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div id="inputs-reparto" class="space-y-4 hidden opacity-0 transition-all duration-300">
                    <div>
                        <label class="text-[9px] uppercase text-gray-400 font-bold ml-1">Fecha de Entrega</label>
                        <input id="fecha-reparto" type="date" class="w-full h-12 px-4 bg-gray-50 rounded-xl border-none text-sm outline-none">
                    </div>
                    <input id="direccion-cliente-input" type="text" placeholder="Dirección exacta para el mapa" class="w-full h-12 px-4 bg-gray-50 rounded-xl border-none text-sm outline-none">
                </div>
            </div>

            <button onclick="confirmarVenta()" class="w-full py-4 bg-primary text-white font-bold text-lg rounded-2xl shadow-lg active:scale-95 transition-transform">Confirmar Venta</button>
            <button id="btn-whatsapp-post-venta" onclick="enviarWhatsAppUltimaVenta()" class="hidden w-full py-4 bg-[#25D366] text-white font-bold text-lg rounded-2xl shadow-lg active:scale-95 transition-transform flex items-center justify-center gap-3">
                <span>Enviar Detalle WhatsApp</span>
                <span class="material-symbols-outlined">chat</span>
            </button>
        </div>
    </main>

    <main id="view-historial" class="pt-24 px-6 max-w-lg mx-auto hidden">
        <section class="mb-6">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">Historial</h1>
            <div class="text-primary font-black text-xl" id="resumen-total-historial"></div>
        </section>
        
        <div class="bg-white p-4 rounded-2xl mb-6 flex items-center gap-2 shadow-sm">
            <input type="date" id="filtro-desde" class="w-full bg-gray-50 border-none rounded-lg text-xs p-2 outline-none">
            <input type="date" id="filtro-hasta" class="w-full bg-gray-50 border-none rounded-lg text-xs p-2 outline-none">
            <button onclick="aplicarFiltroFechas()" class="bg-primary text-white p-2 rounded-lg"><span class="material-symbols-outlined">search</span></button>
        </div>
        <div class="space-y-3" id="lista-historial"></div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 py-4 bg-white/90 backdrop-blur-md border-t z-50">
        <div id="nav-dashboard" onclick="cambiarVista('dashboard')" class="nav-item active flex flex-col items-center p-2 transition-all"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-bold">Dash</span></div>
        <div id="nav-catalogo" onclick="cambiarVista('catalogo')" class="nav-item inactive flex flex-col items-center p-2 transition-all"><span class="material-symbols-outlined">inventory_2</span><span class="text-[10px] font-bold">Catálogo</span></div>
        <div id="nav-venta" onclick="cambiarVista('venta')" class="nav-item inactive flex flex-col items-center p-2 transition-all"><span class="material-symbols-outlined">add_shopping_cart</span><span class="text-[10px] font-bold">Venta</span></div>
        <div id="nav-historial" onclick="cambiarVista('historial')" class="nav-item inactive flex flex-col items-center p-2 transition-all"><span class="material-symbols-outlined">history</span><span class="text-[10px] font-bold">Historial</span></div>
    </nav>

    <div id="modal-detalle" class="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm hidden flex items-center justify-center px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-start mb-2">
                <div>
                    <h2 class="font-extrabold text-2xl" id="modal-cliente"></h2>
                    <p class="text-sm opacity-60" id="modal-fecha"></p>
                </div>
                <button onclick="cerrarModal()" class="p-1 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><span class="material-symbols-outlined text-[18px]">close</span></button>
            </div>
            
            <div id="modal-lista-productos" class="space-y-2 border-b pb-4 mb-4 mt-2 text-sm"></div>
            
            <div id="modal-panel-logistica" class="bg-gray-50 p-4 rounded-2xl mb-4 space-y-2 hidden">
                <p class="text-[10px] font-bold uppercase text-gray-400">Reparto Propio</p>
                <div class="flex items-center gap-2 text-xs font-bold"><span class="material-symbols-outlined text-[16px] text-primary">calendar_month</span><span id="modal-reparto-fecha"></span></div>
                <div class="flex items-center gap-2 text-xs font-bold"><span class="material-symbols-outlined text-[16px] text-primary">location_on</span><span id="modal-reparto-dir"></span></div>
                <div id="modal-mapa" class="w-full h-32 bg-gray-200 rounded-xl overflow-hidden mt-2"></div>
                <button id="btn-waze-modal" class="w-full py-3 bg-[#33ccff] text-white rounded-xl font-bold text-xs flex items-center justify-center gap-2 mt-2"><span class="material-symbols-outlined text-[16px]">navigation</span> Abrir Waze</button>
            </div>

            <div class="flex justify-between items-end border-b pb-4 mb-4">
                <div id="modal-detalle-financiero" class="space-y-1 text-xs w-2/3"></div>
                <button onclick="editarLogisticaActual()" class="text-primary font-bold text-[10px] uppercase underline bg-blue-50 px-2 py-1 rounded-lg">Editar Datos</button>
            </div>

            <div class="flex justify-between items-center">
                <button onclick="eliminarVentaActual()" class="text-error font-bold text-xs">Eliminar</button>
                <button onclick="compartirPorWhatsApp()" class="bg-[#25D366] text-white px-4 py-2 rounded-xl font-bold text-xs">WhatsApp</button>
                <div class="text-right"><span class="text-xs font-bold block opacity-40">Total</span><span class="text-3xl font-extrabold text-primary" id="modal-total"></span></div>
            </div>
        </div>
    </div>

    <div id="modal-categorias" class="fixed inset-0 z-[120] bg-black/40 hidden flex items-center justify-center px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h2 class="font-extrabold text-xl mb-4">Gestionar Categorías</h2>
            
            <div class="flex gap-2 mb-4">
                <input id="nueva-cat-input" type="text" placeholder="Ej: Pescados, Postres..." class="w-full bg-gray-100 p-3 rounded-xl border-none outline-none text-sm font-bold">
                <button onclick="crearCategoria()" class="bg-primary text-white px-4 rounded-xl font-bold text-sm">Crear</button>
            </div>

            <div id="lista-categorias-admin" class="space-y-2 max-h-60 overflow-y-auto mb-4 border-t pt-4">
                </div>

            <button onclick="cerrarModalCategorias()" class="w-full bg-gray-100 text-gray-600 font-bold py-3 rounded-xl">Cerrar</button>
        </div>
    </div>

    <div id="modal-producto" class="fixed inset-0 z-[110] bg-black/40 hidden flex items-center justify-center px-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 shadow-2xl">
            <h2 id="modal-producto-titulo" class="font-extrabold text-xl mb-4">Producto</h2>
            <input type="hidden" id="prod-id-edit">
            
            <div class="space-y-3">
                <input id="prod-nombre" type="text" placeholder="Nombre" class="w-full bg-gray-100 p-4 rounded-2xl border-none outline-none font-bold">
                
                <div>
                    <label class="text-[10px] font-bold text-gray-400 ml-2">CATEGORÍA</label>
                    <select id="prod-categoria" class="w-full bg-gray-100 p-4 rounded-2xl border-none outline-none text-sm text-[#191c1e] font-bold">
                        </select>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 ml-2">COSTO ($)</label>
                        <input id="prod-costo" type="number" placeholder="Costo" class="w-full bg-gray-100 p-4 rounded-2xl border-none outline-none font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-400 ml-2">VENTA ($)</label>
                        <input id="prod-venta" type="number" placeholder="Venta" class="w-full bg-gray-100 p-4 rounded-2xl border-none outline-none font-bold">
                    </div>
                </div>
            </div>
            
            <button onclick="guardarProductoNube()" class="w-full py-4 bg-primary text-white font-bold rounded-2xl shadow-lg mt-6 active:scale-95 transition-transform">Guardar Cambios</button>
            <button onclick="cerrarModalProducto()" class="w-full text-gray-400 font-bold uppercase text-xs mt-4">Cancelar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByG_bsoZoKPpIka_MlSPl_Xu_ljlYQStI",
            authDomain: "ventas-stgo-fade4.firebaseapp.com",
            projectId: "ventas-stgo-fade4",
            storageBucket: "ventas-stgo-fade4.firebasestorage.app",
            messagingSenderId: "832645466602",
            appId: "1:832645466602:web:b9f21f4390d56294b48a93"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let catalogoApp = [], carrito = [], historialVentas = [], categoriasApp = [], idVentaAbierta = null, ultimaVentaRealizada = null;

        function inicializarApp() {
            document.getElementById('fecha-reparto').valueAsDate = new Date();
            
            // Sincronizar Categorías
            db.collection("categorias").orderBy("nombre").onSnapshot((snap) => {
                categoriasApp = [];
                snap.forEach(doc => categoriasApp.push({id: doc.id, nombre: doc.data().nombre}));
                actualizarSelectCategorias();
                renderizarCatalogo();
                renderizarListaCategoriasAdmin();
            });

            // Sincronizar Catálogo
            db.collection("productos").orderBy("nombre").onSnapshot(s => {
                catalogoApp = []; s.forEach(doc => catalogoApp.push(doc.data()));
                renderizarCatalogo();
                renderizarDashboard(); 
            });

            // Sincronizar Ventas
            db.collection("ventas").orderBy("idVenta", "desc").onSnapshot(snap => {
                historialVentas = []; snap.forEach(doc => historialVentas.push(doc.data()));
                renderizarHistorial();
                renderizarDashboard();
                if(idVentaAbierta) abrirModal(idVentaAbierta);
            });
        }

        // --- SISTEMA DE CATEGORÍAS ---
        function actualizarSelectCategorias() {
            const select = document.getElementById('prod-categoria');
            select.innerHTML = categoriasApp.length ? categoriasApp.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('') : '<option value="Sin Categoría">Sin Categoría</option>';
        }

        function abrirModalCategorias() {
            const m = document.getElementById('modal-categorias');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 10);
            renderizarListaCategoriasAdmin();
        }

        function cerrarModalCategorias() {
            const m = document.getElementById('modal-categorias');
            m.classList.add('opacity-0');
            setTimeout(() => m.classList.add('hidden'), 300);
        }

        function renderizarListaCategoriasAdmin() {
            const cont = document.getElementById('lista-categorias-admin');
            cont.innerHTML = categoriasApp.map(c => `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-xl">
                    <span class="font-bold text-sm">${c.nombre}</span>
                    <button onclick="borrarCategoria('${c.id}')" class="text-red-400 bg-red-50 p-2 rounded-lg flex items-center justify-center active:scale-95">
                        <span class="material-symbols-outlined text-[16px]">delete</span>
                    </button>
                </div>
            `).join('');
        }

        function crearCategoria() {
            const input = document.getElementById('nueva-cat-input');
            const val = input.value.trim().toUpperCase();
            if(!val) return;
            const id = val.replace(/\s+/g, '_').toLowerCase() + '_' + Date.now().toString().slice(-4);
            db.collection("categorias").doc(id).set({nombre: val}).then(() => { input.value = ''; });
        }

        function borrarCategoria(id) {
            if(confirm("¿Eliminar categoría? Los productos de esta no se borrarán.")) {
                db.collection("categorias").doc(id).delete();
            }
        }

        function renderizarCatalogo() {
            const grid = document.getElementById('catalogo-grid');
            grid.innerHTML = '';
            
            const agrupados = {};
            catalogoApp.forEach(p => {
                const cat = p.categoria || "Sin Categoría";
                if(!agrupados[cat]) agrupados[cat] = [];
                agrupados[cat].push(p);
            });

            // Orden según lo que tengas en la base de datos de categorías
            const ordenCats = categoriasApp.map(c => c.nombre);
            Object.keys(agrupados).forEach(c => { if(!ordenCats.includes(c)) ordenCats.push(c); });

            let html = '';
            ordenCats.forEach(cat => {
                if(agrupados[cat] && agrupados[cat].length > 0) {
                    html += `
                        <div class="col-span-1 mt-4 mb-1 flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full bg-primary"></span>
                            <h2 class="text-xs font-extrabold text-primary uppercase tracking-widest">${cat}</h2>
                        </div>
                    `;
                    agrupados[cat].forEach(p => {
                        html += `
                            <div class="bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4">
                                <div class="flex-grow" onclick="abrirEdicionProd('${p.id}')">
                                    <h3 class="font-bold text-sm">${p.nombre}</h3>
                                    <p class="text-primary font-black text-lg">${fmt(p.venta)}</p>
                                    <p class="text-[9px] text-gray-400">COSTO: ${fmt(p.costo)}</p>
                                </div>
                                <button onclick="addCarrito('${p.id}')" class="bg-blue-50 text-primary w-12 h-12 rounded-2xl flex items-center justify-center active:scale-95 transition-transform">
                                    <span class="material-symbols-outlined">add_shopping_cart</span>
                                </button>
                            </div>
                        `;
                    });
                }
            });
            grid.innerHTML = html;
        }

        function abrirModalProducto() {
            document.getElementById('prod-id-edit').value = "";
            document.getElementById('prod-nombre').value = "";
            document.getElementById('prod-costo').value = "";
            document.getElementById('prod-venta').value = "";
            if(categoriasApp.length > 0) document.getElementById('prod-categoria').value = categoriasApp[0].nombre;
            
            const m = document.getElementById('modal-producto');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 10);
        }

        function abrirEdicionProd(id) {
            const p = catalogoApp.find(x => x.id == id);
            document.getElementById('prod-id-edit').value = p.id;
            document.getElementById('prod-nombre').value = p.nombre;
            document.getElementById('prod-costo').value = p.costo;
            document.getElementById('prod-venta').value = p.venta;
            document.getElementById('prod-categoria').value = p.categoria || (categoriasApp.length ? categoriasApp[0].nombre : "Sin Categoría");
            
            const m = document.getElementById('modal-producto');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 10);
        }

        function cerrarModalProducto() { 
            const m = document.getElementById('modal-producto');
            m.classList.add('opacity-0'); 
            setTimeout(() => m.classList.add('hidden'), 300); 
        }

        function guardarProductoNube() {
            const id = document.getElementById('prod-id-edit').value || document.getElementById('prod-nombre').value.replace(/\s+/g, '_').toLowerCase() + '_' + Date.now().toString().slice(-4);
            const n = document.getElementById('prod-nombre').value;
            const c = parseInt(document.getElementById('prod-costo').value);
            const v = parseInt(document.getElementById('prod-venta').value);
            const cat = document.getElementById('prod-categoria').value;

            if(!n || isNaN(c) || isNaN(v)) return alert("Completa los datos de costo y venta.");

            db.collection("productos").doc(id).set({
                id: id, 
                nombre: n, 
                costo: c, 
                venta: v, 
                ganancia: v - c,
                categoria: cat
            }).then(cerrarModalProducto);
        }

        // --- FUNCIONES VENTAS Y CARRITO ---
        function toggleInputsReparto() {
            const check = document.getElementById('check-hago-reparto');
            const container = document.getElementById('inputs-reparto');
            if(check.checked) {
                container.classList.remove('hidden');
                setTimeout(() => container.classList.remove('opacity-0'), 10);
            } else {
                container.classList.add('opacity-0');
                setTimeout(() => container.classList.add('hidden'), 300);
            }
        }

        function addCarrito(id) {
            const p = catalogoApp.find(x => x.id === id);
            const it = carrito.find(x => x.id === id);
            if (it) it.can++; else carrito.push({ ...p, can: 1 });
            renderCarrito();
        }

        function renderCarrito() {
            const cont = document.getElementById('carrito-contenedor'), totalT = document.getElementById('total-venta-en-curso');
            if (carrito.length === 0) { cont.innerHTML = '<p class="text-center py-4 text-gray-400 text-sm font-semibold">El carrito está vacío</p>'; totalT.innerText = '$ 0'; return; }
            
            let h = '', t = 0;
            carrito.forEach((it, i) => {
                t += (it.venta * it.can);
                h += `
                <div class="flex justify-between items-center bg-gray-50 p-3 rounded-2xl">
                    <span class="font-bold text-sm truncate w-1/2">${it.nombre}</span>
                    <div class="flex items-center gap-3">
                        <button onclick="modCarrito(${i},-1)" class="w-8 h-8 rounded-full border bg-white flex items-center justify-center">-</button>
                        <b class="w-4 text-center">${it.can}</b>
                        <button onclick="modCarrito(${i},1)" class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center">+</button>
                    </div>
                </div>`;
            });
            cont.innerHTML = h; totalT.innerText = fmt(t);
        }

        function modCarrito(i, d) { 
            carrito[i].can += d; 
            if(carrito[i].can <= 0) carrito.splice(i,1); 
            renderCarrito(); 
        }

        function confirmarVenta() {
            if (carrito.length === 0) return;
            const cli = document.getElementById('nombre-cliente').value.trim() || "Mostrador";
            const del = parseInt(document.getElementById('costo-delivery-input').value) || 0;
            const hagoReparto = document.getElementById('check-hago-reparto').checked;
            
            let v = { 
                idVenta: historialVentas.length ? Math.max(...historialVentas.map(v => parseInt(v.idVenta))) + 1 : 1013, 
                fechaIso: new Date().toISOString().split('T')[0], 
                fechaStr: new Date().toLocaleDateString('es-CL'), 
                hora: new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' }), 
                total: carrito.reduce((s, it) => s + (it.venta * it.can), 0), 
                costoDelivery: del, 
                cliente: cli, 
                hagoReparto: hagoReparto,
                direccion: hagoReparto ? document.getElementById('direccion-cliente-input').value.trim() : "",
                fechaReparto: hagoReparto ? document.getElementById('fecha-reparto').value : "",
                items: carrito.map(it => ({nombre: it.nombre, cantidad: it.can, venta: it.venta})) 
            };

            db.collection("ventas").doc(v.idVenta.toString()).set(v).then(() => {
                ultimaVentaRealizada = v; carrito = []; renderCarrito();
                document.getElementById('btn-confirmar-venta').classList.add('hidden');
                document.getElementById('btn-whatsapp-post-venta').classList.remove('hidden');
            });
        }

        // --- DASHBOARD ---
        function renderizarDashboard() {
            const sel = document.getElementById('dash-mes');
            const meses = [...new Set(historialVentas.map(v => v.fechaIso.substring(0,7)))].sort().reverse();
            if(sel.innerHTML == "" && meses.length) sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            const filtradas = historialVentas.filter(v => v.fechaIso.startsWith(sel.value));
            let totalV = 0, totalC = 0, totalD = 0;

            filtradas.forEach(v => {
                totalV += v.total;
                totalD += (v.costoDelivery || 0);
                v.items.forEach(it => {
                    let p = catalogoApp.find(cp => cp.nombre === it.nombre);
                    totalC += ((p ? p.costo : 0) * it.cantidad);
                });
            });

            document.getElementById('dash-summary').innerHTML = `
                <div class="col-span-2 bg-primary p-6 rounded-3xl text-white shadow-xl">
                    <p class="text-xs opacity-70 uppercase font-bold tracking-widest">Ingresos Mes</p>
                    <p class="text-4xl font-black">${fmt(totalV)}</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Costo Prod</p>
                    <p class="text-lg font-bold">${fmt(totalC)}</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Gasto Envío</p>
                    <p class="text-lg font-bold">${fmt(totalD)}</p>
                </div>
                <div class="col-span-2 bg-secondary p-5 rounded-3xl text-white shadow-lg flex justify-between items-center">
                    <span class="font-bold">Utilidad Neta</span>
                    <span class="text-2xl font-black">${fmt(totalV - totalC - totalD)}</span>
                </div>`;
            
            let sCli = {}; filtradas.forEach(v => sCli[v.cliente] = (sCli[v.cliente] || 0) + 1);
            let tCli = Object.entries(sCli).sort((a,b) => b[1] - a[1]).slice(0,3);
            let hCli = '<h4 class="text-xs font-bold text-gray-400 uppercase mb-3">Top Clientes</h4>';
            tCli.forEach(c => hCli += `<div class="flex justify-between text-sm py-2 border-b last:border-0"><span class="font-bold">${c[0]}</span><b class="text-primary">${c[1]} pedidos</b></div>`);
            document.getElementById('dash-top-clientes').innerHTML = tCli.length ? hCli : '<p class="text-sm text-gray-400">Aún no hay clientes.</p>';
        }

        // --- HISTORIAL Y MODAL DE VENTAS ---
        function renderizarHistorial() {
            const cont = document.getElementById('lista-historial');
            cont.innerHTML = historialVentas.map(v => `
                <div onclick="abrirModal(${v.idVenta})" class="bg-white p-4 rounded-3xl shadow-sm flex justify-between items-center border-l-4 ${v.hagoReparto ? 'border-primary' : 'border-gray-200'} active:scale-[0.98] transition-transform">
                    <div class="flex-grow">
                        <p class="font-bold text-sm">${v.cliente}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">${v.fechaStr}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="font-black text-primary text-sm">${fmt(v.total)}</p>
                    </div>
                </div>`).join('');
            document.getElementById('resumen-total-historial').innerText = "Total Histórico: " + fmt(historialVentas.reduce((s,v) => s+v.total,0));
        }

        function abrirModal(id) {
            const v = historialVentas.find(x => x.idVenta == id); if(!v) return;
            idVentaAbierta = id; 
            document.getElementById('modal-cliente').innerText = v.cliente; 
            document.getElementById('modal-fecha').innerText = `${v.fechaStr} · ${v.hora}`;
            
            let hIt = ''; v.items.forEach(it => hIt += `<div class="flex justify-between text-sm py-1"><span>${it.cantidad}x ${it.nombre}</span><b class="text-[#191c1e]">${fmt(it.venta*it.cantidad)}</b></div>`);
            document.getElementById('modal-lista-productos').innerHTML = hIt;
            
            let costP = v.items.reduce((s, it) => s + ((catalogoApp.find(cp => cp.nombre === it.nombre)?.costo || 0) * it.cantidad), 0);
            
            document.getElementById('modal-detalle-financiero').innerHTML = `
                <div class="flex justify-between text-gray-500"><span>Costo Mercadería:</span><span>${fmt(costP)}</span></div>
                <div class="flex justify-between text-gray-500"><span>Delivery/Envío:</span><span>${fmt(v.costoDelivery)}</span></div>
                <div class="flex justify-between font-bold text-secondary mt-1 pt-2 border-t text-sm"><span>Utilidad Limpia:</span><span>${fmt(v.total - costP - (v.costoDelivery || 0))}</span></div>`;
            
            document.getElementById('modal-total').innerText = fmt(v.total);
            
            const logisticaPanel = document.getElementById('modal-panel-logistica');
            if (v.hagoReparto && v.direccion) {
                document.getElementById('modal-reparto-fecha').innerText = v.fechaReparto ? v.fechaReparto.split('-').reverse().join('-') : '---';
                document.getElementById('modal-reparto-dir').innerText = v.direccion;
                const queryLocation = encodeURIComponent(v.direccion + ", Santiago, Chile");
                document.getElementById('modal-mapa').innerHTML = `<iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${queryLocation}&output=embed"></iframe>`;
                document.getElementById('btn-waze-modal').onclick = () => window.open(`https://waze.com/ul?q=${queryLocation}`, '_blank');
                logisticaPanel.classList.remove('hidden');
            } else { logisticaPanel.classList.add('hidden'); }

            const m = document.getElementById('modal-detalle');
            m.classList.remove('hidden');
            setTimeout(() => m.classList.remove('opacity-0'), 10);
        }

        function editarLogisticaActual() {
            const v = historialVentas.find(x => x.idVenta == idVentaAbierta);
            let nDel = prompt("Costo de Delivery / Envío ($):", v.costoDelivery);
            if (nDel === null) return;
            let nReparto = confirm("¿Vas a hacer tú mismo el reparto?\n(Aceptar = Sí / Cancelar = No, externo)");
            let nDir = "", nFec = "";
            if (nReparto) {
                nDir = prompt("Dirección exacta:", v.direccion || ""); if (nDir === null) return;
                nFec = prompt("Fecha de reparto (YYYY-MM-DD):", v.fechaReparto || new Date().toISOString().split('T')[0]); if (nFec === null) return;
            }
            db.collection("ventas").doc(idVentaAbierta.toString()).update({ costoDelivery: parseInt(nDel) || 0, hagoReparto: nReparto, direccion: nDir, fechaReparto: nFec });
        }

        function enviarWhatsAppUltimaVenta() {
            if(!ultimaVentaRealizada) return;
            let msg = `*Detalle del Pedido*\n`; ultimaVentaRealizada.items.forEach(it => msg += `• ${it.cantidad}x ${it.nombre}: ${fmt(it.venta*it.cantidad)}\n`);
            if(ultimaVentaRealizada.hagoReparto && ultimaVentaRealizada.direccion) msg += `📍 *Reparto:* ${ultimaVentaRealizada.direccion}\n`;
            msg += `\n*TOTAL: ${fmt(ultimaVentaRealizada.total)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            document.getElementById('btn-confirmar-venta').classList.remove('hidden'); 
            document.getElementById('btn-whatsapp-post-venta').classList.add('hidden');
            document.getElementById('nombre-cliente').value = ""; document.getElementById('costo-delivery-input').value = ""; document.getElementById('direccion-cliente-input').value = ""; document.getElementById('check-hago-reparto').checked = false; toggleInputsReparto();
            cambiarVista('historial');
        }

        function compartirPorWhatsApp() {
            const v = historialVentas.find(x => x.idVenta == idVentaAbierta);
            if(v) {
                let msg = `*Detalle*\n`; v.items.forEach(it => msg += `• ${it.cantidad}x ${it.nombre}: ${fmt(it.venta*it.cantidad)}\n`);
                if(v.hagoReparto && v.direccion) msg += `📍 *Reparto:* ${v.direccion}\n`;
                msg += `\n*TOTAL: ${fmt(v.total)}*`;
                window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
            }
        }

        function cerrarModal() { document.getElementById('modal-detalle').classList.add('opacity-0'); setTimeout(() => document.getElementById('modal-detalle').classList.add('hidden'), 300); }
        function eliminarVentaActual() { if(confirm("¿Eliminar esta venta para siempre?")) db.collection("ventas").doc(idVentaAbierta.toString()).delete().then(cerrarModal); }

        function aplicarFiltroFechas() {
            let f = historialVentas;
            if(document.getElementById('filtro-desde').value) f = f.filter(v => v.fechaIso >= document.getElementById('filtro-desde').value);
            if(document.getElementById('filtro-hasta').value) f = f.filter(v => v.fechaIso <= document.getElementById('filtro-hasta').value);
            
            document.getElementById('lista-historial').innerHTML = f.map(v => `
                <div onclick="abrirModal(${v.idVenta})" class="bg-white p-4 rounded-3xl shadow-sm mb-3 flex justify-between items-center border-l-4 ${v.hagoReparto ? 'border-primary' : 'border-gray-200'} active:scale-95 transition-transform">
                    <div>
                        <p class="font-bold text-sm">${v.cliente}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-tight">${v.hagoReparto ? ('Reparto: ' + v.fechaReparto) : 'Externo/Retiro'}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="font-black text-primary">${fmt(v.total)}</p>
                    </div>
                </div>
            `).join('') || '<p class="text-center py-10 text-gray-400 text-sm font-bold">No hay registros</p>';
            
            document.getElementById('resumen-total-historial').innerText = "Total Filtrado: " + fmt(f.reduce((s, v) => s + v.total, 0));
        }

        function cambiarVista(v) {
            ['dashboard', 'catalogo', 'venta', 'historial'].forEach(x => document.getElementById('view-'+x).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(it => it.classList.replace('active','inactive'));
            document.getElementById('nav-'+v).classList.replace('inactive','active');
        }

        const fmt = (v) => new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(v || 0);

        inicializarApp(); cambiarVista('dashboard');
    </script>
</body>
</html>

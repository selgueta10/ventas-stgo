<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Ventas Stgo - Sistema POS</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ventas Stgo">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e4/Fish_icon.svg/512px-Fish_icon.svg.png">

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#0b55cf", "secondary": "#006e2c", "surface": "#f8f9fb", "error": "#ba1a1a" },
                    fontFamily: { "headline": ["Manrope"], "body": ["Inter"] },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-icon { font-variation-settings: 'FILL' 1; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .nav-item.active { background-color: rgba(11, 85, 207, 0.1); color: #0b55cf; border-radius: 0.75rem; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-surface text-[#191c1e] min-h-screen pb-32">

    <header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md shadow-sm flex items-center justify-between px-6 h-16">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                <span class="material-symbols-outlined text-primary">storefront</span>
            </div>
            <span class="font-manrope font-black text-primary text-lg tracking-tighter">Ventas Stgo</span>
        </div>
    </header>

    <main id="view-dashboard" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <h1 class="text-4xl font-extrabold tracking-tight mb-6">Dashboard</h1>
        <select id="dash-mes" onchange="renderizarDashboard()" class="w-full mb-6 bg-white border-none rounded-2xl font-bold py-4 px-4 shadow-sm outline-none"></select>
        <div id="dash-summary" class="grid grid-cols-2 gap-4 mb-8"></div>
        <div id="dash-top-clientes" class="bg-white p-5 rounded-3xl shadow-sm mb-6"></div>
    </main>

    <main id="view-catalogo" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-4xl font-extrabold tracking-tight">Catálogo</h1>
            <button onclick="abrirModalProducto()" class="bg-primary text-white p-3 rounded-2xl shadow-lg"><span class="material-symbols-outlined">add</span></button>
        </div>
        <div id="catalogo-grid" class="grid grid-cols-1 gap-4"></div>
    </main>

    <main id="view-venta" class="pt-24 px-4 max-w-lg mx-auto space-y-6 hidden">
        <h2 class="text-5xl font-extrabold text-primary text-center tracking-tighter" id="total-venta-en-curso">$ 0</h2>
        <div id="carrito-contenedor" class="bg-white p-4 rounded-3xl space-y-3 shadow-sm min-h-[100px]"></div>
        <div class="space-y-3">
            <input id="nombre-cliente" type="text" placeholder="Nombre del Cliente" class="w-full h-14 px-4 bg-white rounded-2xl border-none shadow-sm outline-none">
            <input id="costo-delivery-input" type="number" placeholder="Costo Envío ($)" class="w-full h-14 px-4 bg-white rounded-2xl border-none shadow-sm outline-none">
            
            <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm space-y-3">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] font-bold uppercase text-gray-400">¿Hago yo el reparto?</p>
                    <input type="checkbox" id="check-hago-reparto" class="w-5 h-5 rounded border-gray-300 text-primary">
                </div>
                <input id="direccion-cliente-input" type="text" placeholder="Dirección para la Ruta" class="w-full h-12 px-4 bg-gray-50 rounded-xl border-none text-sm outline-none">
            </div>

            <button onclick="confirmarVenta()" class="w-full py-4 bg-primary text-white font-bold text-lg rounded-2xl shadow-lg">Confirmar Venta</button>
        </div>
    </main>

    <main id="view-rutas" class="pt-24 px-6 max-w-2xl mx-auto hidden">
        <div class="flex justify-between items-start mb-2">
            <h1 class="text-4xl font-extrabold tracking-tight">Mi Ruta</h1>
            <button onclick="vaciarRuta()" class="text-red-500 text-xs font-bold uppercase mt-2">Limpiar</button>
        </div>
        <div id="lista-ruta-maestra" class="space-y-4"></div>
        <div id="ruta-vacia-msg" class="text-center py-20 opacity-20">
            <span class="material-symbols-outlined text-7xl">route</span>
            <p class="font-bold mt-2">Agrega pedidos desde el historial</p>
        </div>
    </main>

    <main id="view-historial" class="pt-24 px-6 max-w-lg mx-auto hidden">
        <h1 class="text-4xl font-extrabold tracking-tight mb-4">Historial</h1>
        <div id="resumen-total-historial" class="mb-6 text-primary font-black text-xl"></div>
        <div id="lista-historial" class="space-y-3"></div>
    </main>

    <nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-2 py-4 bg-white/90 backdrop-blur-md border-t z-50">
        <div id="nav-dashboard" onclick="cambiarVista('dashboard')" class="nav-item active flex flex-col items-center p-2"><span class="material-symbols-outlined">dashboard</span><span class="text-[10px] font-bold">Dash</span></div>
        <div id="nav-catalogo" onclick="cambiarVista('catalogo')" class="nav-item inactive flex flex-col items-center p-2"><span class="material-symbols-outlined">inventory_2</span><span class="text-[10px] font-bold">Catálogo</span></div>
        <div id="nav-venta" onclick="cambiarVista('venta')" class="nav-item inactive flex flex-col items-center p-2"><span class="material-symbols-outlined">add_shopping_cart</span><span class="text-[10px] font-bold">Venta</span></div>
        <div id="nav-rutas" onclick="cambiarVista('rutas')" class="nav-item inactive flex flex-col items-center p-2"><span class="material-symbols-outlined">local_shipping</span><span class="text-[10px] font-bold">Rutas</span></div>
        <div id="nav-historial" onclick="cambiarVista('historial')" class="nav-item inactive flex flex-col items-center p-2"><span class="material-symbols-outlined">history</span><span class="text-[10px] font-bold">Historial</span></div>
    </nav>

    <div id="modal-detalle" class="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm hidden flex items-center justify-center px-4 opacity-0 transition-all duration-300">
        <div class="bg-white w-full max-w-md rounded-3xl overflow-hidden p-6 max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-start mb-2">
                <div><h2 class="font-extrabold text-2xl" id="modal-cliente"></h2><p class="text-sm opacity-60" id="modal-fecha"></p></div>
                <button onclick="cerrarModal()" class="p-1 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center"><span class="material-symbols-outlined text-[18px]">close</span></button>
            </div>
            <div id="modal-lista-productos" class="space-y-2 border-b pb-4 mb-4 mt-2 text-sm"></div>
            <div id="modal-panel-logistica" class="bg-gray-50 p-4 rounded-2xl mb-4 space-y-2 hidden">
                <p class="text-[10px] font-bold uppercase text-outline">Información de Reparto</p>
                <div class="flex items-center gap-2 text-xs font-bold"><span class="material-symbols-outlined text-[16px] text-primary">location_on</span><span id="modal-reparto-dir"></span></div>
                <div id="modal-mapa" class="w-full h-32 bg-gray-200 rounded-xl overflow-hidden mt-2"></div>
                <button id="btn-waze-modal" class="w-full py-3 bg-[#33ccff] text-white rounded-xl font-bold text-xs flex items-center justify-center gap-2 mt-2"><span class="material-symbols-outlined text-[16px]">navigation</span> Abrir Waze</button>
            </div>
            <div id="modal-detalle-financiero" class="space-y-1 mb-4 text-xs border-b pb-4"></div>
            <div class="flex justify-between items-center">
                <button onclick="eliminarVentaActual()" class="text-error font-bold text-xs">Eliminar</button>
                <button onclick="compartirPorWhatsApp()" class="bg-[#25D366] text-white px-4 py-2 rounded-xl font-bold text-xs">WhatsApp</button>
                <div class="text-right"><span class="text-xs font-bold block opacity-40">Total</span><span class="text-3xl font-extrabold text-primary" id="modal-total"></span></div>
            </div>
        </div>
    </div>

    <div id="modal-producto" class="fixed inset-0 z-[110] bg-black/40 hidden flex items-center justify-center px-4">
        <div class="bg-white w-full max-w-md rounded-3xl p-6 space-y-4">
            <h2 id="modal-producto-titulo" class="font-extrabold text-xl">Producto</h2>
            <input type="hidden" id="prod-id-edit"><input id="prod-nombre" type="text" placeholder="Nombre" class="w-full bg-gray-100 p-4 rounded-2xl border-none">
            <div class="grid grid-cols-2 gap-4"><input id="prod-costo" type="number" placeholder="Costo" class="w-full bg-gray-100 p-4 rounded-2xl border-none"><input id="prod-venta" type="number" placeholder="Venta" class="w-full bg-gray-100 p-4 rounded-2xl border-none"></div>
            <button onclick="guardarProductoNube()" class="w-full py-4 bg-primary text-white font-bold rounded-2xl">Guardar</button>
            <button onclick="cerrarModalProducto()" class="w-full text-gray-400 text-xs">Cerrar</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByG_bsoZoKPpIka_MlSPl_Xu_ljlYQStI",
            authDomain: "ventas-stgo-fade4.firebaseapp.com",
            projectId: "ventas-stgo-fade4",
            storageBucket: "ventas-stgo-fade4.firebasestorage.app",
            messagingSenderId: "832645466602",
            appId: "1:832645466602:web:b9f21f4390d56294b48a93"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let catalogoApp = [], carrito = [], historialVentas = [], idVentaAbierta = null;
        let rutaActiva = JSON.parse(localStorage.getItem('rutaActiva_V2')) || [];

        function inicializarApp() {
            // Sincronizar Catálogo
            db.collection("productos").orderBy("nombre").onSnapshot(s => {
                catalogoApp = []; s.forEach(doc => catalogoApp.push(doc.data()));
                renderizarCatalogo();
                renderizarDashboard(); // Recalcular con costos frescos
            });

            // Sincronizar Ventas
            db.collection("ventas").orderBy("idVenta", "desc").onSnapshot(snap => {
                historialVentas = []; snap.forEach(doc => historialVentas.push(doc.data()));
                renderizarHistorial();
                renderizarDashboard();
            });
        }

        // --- DASHBOARD CALCULOS ---
        function renderizarDashboard() {
            const sel = document.getElementById('dash-mes');
            const meses = [...new Set(historialVentas.map(v => v.fechaIso.substring(0,7)))].sort().reverse();
            if(sel.innerHTML == "" && meses.length) sel.innerHTML = meses.map(m => `<option value="${m}">${m}</option>`).join('');
            
            const mSel = sel.value;
            const filtradas = historialVentas.filter(v => v.fechaIso.startsWith(mSel));
            
            let totalVenta = 0, totalCosto = 0, totalDeliv = 0;

            filtradas.forEach(v => {
                totalVenta += v.total;
                totalDeliv += (v.costoDelivery || 0);
                v.items.forEach(it => {
                    let p = catalogoApp.find(cp => cp.nombre === it.nombre);
                    totalCosto += ((p ? p.costo : 0) * it.cantidad);
                });
            });

            const gananciaNeta = totalVenta - totalCosto - totalDeliv;

            document.getElementById('dash-summary').innerHTML = `
                <div class="col-span-2 bg-primary p-6 rounded-3xl text-white shadow-xl">
                    <p class="text-xs opacity-70 uppercase font-bold">Ventas Totales</p>
                    <p class="text-4xl font-black">${fmt(totalVenta)}</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Costo Mercadería</p>
                    <p class="text-lg font-bold">${fmt(totalCosto)}</p>
                </div>
                <div class="bg-white p-4 rounded-3xl shadow-sm">
                    <p class="text-[10px] font-bold text-gray-400 uppercase">Costo Delivery</p>
                    <p class="text-lg font-bold">${fmt(totalDeliv)}</p>
                </div>
                <div class="col-span-2 bg-secondary p-5 rounded-3xl text-white shadow-lg flex justify-between items-center">
                    <span class="font-bold">Utilidad Real</span>
                    <span class="text-2xl font-black">${fmt(gananciaNeta)}</span>
                </div>
            `;
        }

        // --- HISTORIAL ---
        function renderizarHistorial() {
            const cont = document.getElementById('lista-historial');
            cont.innerHTML = historialVentas.map(v => `
                <div onclick="abrirModal(${v.idVenta})" class="bg-white p-4 rounded-3xl shadow-sm flex justify-between items-center border-l-4 border-primary active:scale-[0.98] transition-transform">
                    <div class="flex-grow">
                        <p class="font-bold text-sm">${v.cliente}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">${v.fechaStr}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <p class="font-black text-primary text-sm">${fmt(v.total)}</p>
                        <button onclick="agregarARuta(event, ${v.idVenta})" class="w-10 h-10 bg-primary text-white rounded-full flex items-center justify-center shadow-md">
                            <span class="material-symbols-outlined text-[18px]">add_road</span>
                        </button>
                    </div>
                </div>`).join('');
            document.getElementById('resumen-total-historial').innerText = "Ventas: " + fmt(historialVentas.reduce((s,v) => s+v.total,0));
        }

        function abrirModal(id) {
            const v = historialVentas.find(x => x.idVenta == id); if(!v) return;
            idVentaAbierta = id;
            document.getElementById('modal-cliente').innerText = v.cliente;
            document.getElementById('modal-fecha').innerText = `${v.fechaStr} · ${v.hora || '12:00'}`;
            document.getElementById('modal-total').innerText = fmt(v.total);
            
            let hIt = ''; v.items.forEach(it => hIt += `<div class="flex justify-between py-1"><span>${it.cantidad}x ${it.nombre}</span><b>${fmt(it.venta * it.cantidad)}</b></div>`);
            document.getElementById('modal-lista-productos').innerHTML = hIt;
            
            let costP = v.items.reduce((s, it) => {
                let p = catalogoApp.find(cp => cp.nombre === it.nombre);
                return s + ((p ? p.costo : 0) * it.cantidad);
            }, 0);

            document.getElementById('modal-detalle-financiero').innerHTML = `
                <div class="flex justify-between"><span>Costo Productos:</span><span>${fmt(costP)}</span></div>
                <div class="flex justify-between"><span>Delivery:</span><span>${fmt(v.costoDelivery || 0)}</span></div>
                <div class="flex justify-between font-bold text-secondary border-t mt-1 pt-1"><span>Ganancia Venta:</span><span>${fmt(v.total - costP - (v.costoDelivery || 0))}</span></div>
            `;

            const panel = document.getElementById('modal-panel-logistica');
            if (v.direccion) {
                document.getElementById('modal-reparto-dir').innerText = v.direccion;
                document.getElementById('modal-mapa').innerHTML = `<iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=${encodeURIComponent(v.direccion + ', Santiago, Chile')}&output=embed"></iframe>`;
                document.getElementById('btn-waze-modal').onclick = () => window.open(`https://waze.com/ul?q=${encodeURIComponent(v.direccion + ", Santiago, Chile")}&navigate=yes`, '_blank');
                panel.classList.remove('hidden');
            } else { panel.classList.add('hidden'); }

            const m = document.getElementById('modal-detalle'); m.classList.remove('hidden'); setTimeout(() => m.classList.remove('opacity-0'), 10);
        }

        function cerrarModal() { const m = document.getElementById('modal-detalle'); m.classList.add('opacity-0'); setTimeout(() => m.classList.add('hidden'), 300); }

        function eliminarVentaActual() { if(confirm("¿Eliminar venta?")) db.collection("ventas").doc(idVentaAbierta.toString()).delete().then(cerrarModal); }

        function compartirPorWhatsApp() {
            const v = historialVentas.find(x => x.idVenta == idVentaAbierta);
            let msg = `*Detalle del Pedido*\n`; v.items.forEach(it => msg += `• ${it.cantidad}x ${it.nombre}: ${fmt(it.venta*it.cantidad)}\n`);
            msg += `\n*TOTAL: ${fmt(v.total)}*`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // --- RUTAS ---
        function agregarARuta(ev, idVenta) {
            ev.stopPropagation(); // CLAVE: No abre el modal al tocar el botón azul
            const v = historialVentas.find(x => x.idVenta == idVenta);
            if (!v.direccion) return alert("Falta dirección.");
            if (rutaActiva.find(r => r.idVenta == idVenta)) return alert("Ya está en ruta.");
            rutaActiva.push({ idVenta: v.idVenta, cliente: v.cliente, direccion: v.direccion, completado: false });
            localStorage.setItem('rutaActiva_V2', JSON.stringify(rutaActiva));
            alert("Añadido 🚚");
        }

        function renderizarRuta() {
            const cont = document.getElementById('lista-ruta-maestra');
            const msg = document.getElementById('ruta-vacia-msg');
            if (rutaActiva.length === 0) { cont.innerHTML = ''; msg.classList.remove('hidden'); return; }
            msg.classList.add('hidden');
            cont.innerHTML = rutaActiva.map((r, i) => `
                <div class="bg-white p-4 rounded-3xl shadow-sm border-l-8 ${r.completado ? 'border-gray-200 opacity-50' : 'border-primary'} flex flex-col gap-3">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-3"><span class="w-7 h-7 bg-blue-50 text-primary rounded-full flex items-center justify-center font-black text-xs">${i+1}</span>
                        <div><p class="font-bold text-sm leading-none">${r.cliente}</p><p class="text-[9px] text-gray-400 font-bold truncate max-w-[150px]">${r.direccion}</p></div></div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.open('https://waze.com/ul?q=${encodeURIComponent(r.direccion)}&navigate=yes','_blank')" class="flex-grow py-3 bg-[#33ccff] text-white rounded-2xl font-bold text-xs flex items-center justify-center gap-2">Waze</button>
                        <button onclick="toggleCompletado(${i})" class="w-12 bg-green-50 text-green-600 rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined">${r.completado ? 'undo' : 'check'}</span></button>
                        <button onclick="quitarDeRuta(${i})" class="w-12 bg-red-50 text-red-400 rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined">delete</span></button>
                    </div>
                </div>`).join('');
        }
        function toggleCompletado(i) { rutaActiva[i].completado = !rutaActiva[i].completado; localStorage.setItem('rutaActiva_V2', JSON.stringify(rutaActiva)); renderizarRuta(); }
        function quitarDeRuta(i) { rutaActiva.splice(i, 1); localStorage.setItem('rutaActiva_V2', JSON.stringify(rutaActiva)); renderizarRuta(); }
        function vaciarRuta() { if(confirm("¿Vaciar?")) { rutaActiva = []; localStorage.removeItem('rutaActiva_V2'); renderizarRuta(); } }

        // --- AUXILIARES ---
        function renderizarCatalogo() {
            document.getElementById('catalogo-grid').innerHTML = catalogoApp.map(p => `
                <div class="bg-white p-4 rounded-3xl shadow-sm flex items-center gap-4">
                    <div class="flex-grow"><h3 class="font-bold text-sm">${p.nombre}</h3><p class="text-primary font-black text-lg">${fmt(p.venta)}</p></div>
                    <button onclick="addCarrito('${p.id}')" class="bg-blue-50 text-primary w-12 h-12 rounded-2xl flex items-center justify-center"><span class="material-symbols-outlined">add_shopping_cart</span></button>
                </div>`).join('');
        }

        function addCarrito(id) {
            const p = catalogoApp.find(x => x.id === id);
            const it = carrito.find(x => x.id === id);
            if (it) it.can++; else carrito.push({ ...p, can: 1 });
            renderCarrito();
        }

        function renderCarrito() {
            const cont = document.getElementById('carrito-contenedor'), totalT = document.getElementById('total-venta-en-curso');
            if (carrito.length === 0) { cont.innerHTML = '<p class="text-center py-4 text-gray-300">Selecciona productos...</p>'; totalT.innerText = '$ 0'; return; }
            cont.innerHTML = carrito.map((it, i) => `
                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-2xl"><span class="text-xs truncate w-1/2">${it.nombre}</span>
                <div class="flex items-center gap-2"><button onclick="modCarrito(${i},-1)" class="w-8 h-8 rounded-full border">-</button><b>${it.can}</b><button onclick="modCarrito(${i},1)" class="w-8 h-8 rounded-full bg-primary text-white">+</button></div></div>`).join('');
            totalT.innerText = fmt(carrito.reduce((s, it) => s + (it.venta * it.can), 0));
        }

        function modCarrito(i, d) { carrito[i].can += d; if(carrito[i].can<=0) carrito.splice(i,1); renderCarrito(); }

        function confirmarVenta() {
            if (carrito.length === 0) return;
            const idV = historialVentas.length ? Math.max(...historialVentas.map(v => parseInt(v.idVenta))) + 1 : 1013;
            const v = {
                idVenta: idV,
                cliente: document.getElementById('nombre-cliente').value || "Mostrador",
                total: carrito.reduce((s, it) => s + (it.venta * it.can), 0),
                costoDelivery: parseInt(document.getElementById('costo-delivery-input').value) || 0,
                direccion: document.getElementById('direccion-cliente-input').value || "",
                hagoReparto: document.getElementById('check-hago-reparto').checked,
                fechaIso: new Date().toISOString().split('T')[0],
                fechaStr: new Date().toLocaleDateString('es-CL'),
                hora: new Date().toLocaleTimeString('es-CL', { hour: '2-digit', minute: '2-digit' }),
                items: carrito.map(it => ({nombre: it.nombre, cantidad: it.can, venta: it.venta}))
            };
            db.collection("ventas").doc(idV.toString()).set(v).then(() => {
                carrito = []; renderCarrito();
                document.getElementById('nombre-cliente').value = ""; document.getElementById('costo-delivery-input').value = ""; document.getElementById('direccion-cliente-input').value = "";
                cambiarVista('historial');
            });
        }

        const fmt = (v) => new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP' }).format(v || 0);

        function cambiarVista(v) {
            ['dashboard', 'catalogo', 'venta', 'rutas', 'historial'].forEach(x => document.getElementById('view-'+x).classList.add('hidden'));
            document.getElementById('view-'+v).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(it => it.classList.replace('active','inactive'));
            document.getElementById('nav-'+v).classList.replace('inactive','active');
            if(v === 'rutas') renderizarRuta();
        }

        function abrirModalProducto() { document.getElementById('modal-producto').classList.remove('hidden'); }
        function cerrarModalProducto() { document.getElementById('modal-producto').classList.add('hidden'); }
        function guardarProductoNube() {
            const n = document.getElementById('prod-nombre').value;
            const id = n.replace(/\s+/g, '_').toLowerCase();
            db.collection("productos").doc(id).set({id, nombre: n, costo: parseInt(document.getElementById('prod-costo').value), venta: parseInt(document.getElementById('prod-venta').value), ganancia: parseInt(document.getElementById('prod-venta').value) - parseInt(document.getElementById('prod-costo').value)}).then(cerrarModalProducto);
        }

        inicializarApp(); cambiarVista('dashboard');
    </script>
</body>
</html>
